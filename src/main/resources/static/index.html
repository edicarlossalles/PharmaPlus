<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Plus - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png" alt="Logo Pharma Plus">
        <h2>Pharma Plus</h2>

        <div>
            <input type="number" placeholder="Matrícula" id="login" required>
            <input type="password" placeholder="Senha" id="senha" required>
            <p id="erro-login" class="mensagem-erro" style="display:none;"></p>
            <button type="button" onclick="logar()">Entrar</button>
        </div>

        <div class="extra-links">
            <a href="#">Esqueceu a senha?</a> |
            <a href="#" onclick="abrirModal()">Criar conta</a>
        </div>
    </div>

    <!-- Modal de Registro -->
    <div id="modal-registro" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Criar Conta</h3>
            <input type="number" placeholder="Matrícula" id="reg-matricula">
            <input type="password" placeholder="Senha" id="reg-senha">
            <p id="erro-modal" class="mensagem-erro" style="display:none;"></p>
            <button type="button" onclick="registrar()">Cadastrar</button>
            <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
