<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pharma Plus - Login</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

  <div class="login-brand">
    <span class="dot"></span>
    <span>Pharma Plus</span>
  </div>

  <div class="login-heading">
    Bem-vindo de volta
  </div>

  <div class="login-subheading">
    Acesse o sistema com sua matrícula e senha
  </div>

  <div class="field">
    <label>MATRÍCULA</label>
    <input type="text" id="login" placeholder="Ex: 12345">
  </div>

  <div class="field">
    <label>SENHA</label>

    <div class="field-wrap">
      <input type="password" id="senha" placeholder="••••••••">
      <button type="button" class="field-toggle" onclick="toggleSenhaLogin(this)">
        👁
      </button>
    </div>

  </div>

  <button class="btn-main" onclick="logar()">
    Entrar
  </button>

  <div class="msg" id="msg-login"></div>

</div>

<script src="script.js"></script>

</body>
</html>
