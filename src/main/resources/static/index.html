<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pharma Plus - Login</title>

    <!-- Link do CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png" alt="Logo Pharma Plus">
        <h2>Pharma Plus</h2>

        <form>
            <input type="text" placeholder="Usuário" id="login" required>
            <input type="password" placeholder="Senha" id="senha" required>
            <button type="button" onclick="logar()">Entrar</button>
        </form>

        <div class="extra-links">
            <a href="#">Esqueceu a senha?</a> |
            <a href="#">Criar conta</a>
        </div>
    </div>

    <!-- Link do JavaScript -->
    <script src="script.js"></script>

</body>
</html>
