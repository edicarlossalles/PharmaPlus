# ── SQLite ──────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:pharmaplus.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Dialect da comunidade para SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Recria as tabelas a cada início (mude para 'update' depois)
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL no console (útil para debug)
spring.jpa.show-sql=true

# JWT (mantenha igual ao que você já tinha)
jwt.secret=sua-chave-secreta-aqui-com-pelo-menos-32-caracteres